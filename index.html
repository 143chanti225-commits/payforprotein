<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay for Protein AI</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 20px; 
            background-color: #f4f9f4; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 { color: #2e7d32; margin-bottom: 10px; }
        .mic-container {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        #micBtn { 
            font-size: 60px; 
            border-radius: 50%; 
            width: 120px; 
            height: 120px; 
            border: none; 
            cursor: pointer; 
            background: #4CAF50; 
            color: white;
            transition: transform 0.2s, background 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }
        #micBtn:active { transform: scale(0.9); }
        #status { margin-top: 25px; font-size: 18px; color: #555; font-weight: 500; }
        .logo { font-size: 50px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="mic-container">
        <div class="logo">🥗</div>
        <h1>Pay for Protein</h1>
        <button id="micBtn">🎤</button>
        <div id="status">Tap the mic to ask a nutrition doubt</div>
    </div>

    <script>
        const micBtn = document.getElementById('micBtn');
        const status = document.getElementById('status');

        // Check for Browser Support
        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Recognition) {
            status.innerText = "Error: Use Chrome or Safari for Voice";
        } else {
            const speechApi = new Recognition();

            micBtn.onclick = () => {
                try {
                    speechApi.start();
                    status.innerText = "Listening... Speak now!";
                    micBtn.style.background = "#e53935"; // Red while listening
                } catch (e) {
                    console.log("Recognition already started");
                }
            };

            speechApi.onresult = async (event) => {
                const userQuery = event.results[0][0].transcript;
                status.innerText = "Thinking...";
                micBtn.style.background = "#4CAF50"; 

                try {
                    // This is your n8n PRODUCTION URL
                    const response = await fetch('https://payforprotein.app.n8n.cloud/webhook/faef2cf2-a071-4576-8bc1-7f0ec0c05c6c', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: userQuery })
                    });

                    // We expect JSON back: {"answer": "..."}
                    const data = await response.json();
                    const aiAnswer = data.answer || "I received your message but couldn't process it.";
                    
                    speak(aiAnswer); 
                    
                } catch (error) {
                    status.innerText = "Connection Error. Check n8n CORS.";
                    console.error(error);
                }
            };

            speechApi.onerror = () => {
                status.innerText = "Mic Error. Try again.";
                micBtn.style.background = "#4CAF50";
            };
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            window.speechSynthesis.speak(utterance);
            status.innerText = "Done! Tap mic to ask again.";
        }
    </script>
</body>
</html>
