<script>
    const micBtn = document.getElementById('micBtn');
    const status = document.getElementById('status');

    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const speechApi = new Recognition();

    micBtn.onclick = () => {
        speechApi.start();
        status.innerText = "Listening...";
        micBtn.style.background = "#ff4444"; 
    };

    speechApi.onresult = async (event) => {
        const userQuery = event.results[0][0].transcript;
        status.innerText = "Thinking...";
        micBtn.style.background = "#4CAF50"; 

        try {
            // Use the PRODUCTION URL if you want it to work 24/7 without n8n open
            const response = await fetch('https://payforprotein.app.n8n.cloud/webhook/faef2cf2-a071-4576-8bc1-7f0ec0c05c6c', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: userQuery })
            });

            const data = await response.json();
            
            // This pulls the clean answer out of the JSON
            const cleanAnswer = data.answer || "I couldn't hear that clearly.";
            speak(cleanAnswer); 
            
        } catch (error) {
            status.innerText = "Error: " + error;
            console.error("Fetch Error:", error);
        }
    };

    function speak(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        window.speechSynthesis.speak(utterance);
        status.innerText = "Tap mic to ask again";
    }
</script>
