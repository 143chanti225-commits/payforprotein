<!DOCTYPE html>
<html>
<head>
    <title>Pay for Protein AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f9f4; }
        #micBtn { font-size: 50px; border-radius: 50%; width: 100px; height: 100px; border: none; cursor: pointer; background: #4CAF50; color: white; }
        .status { margin-top: 20px; color: #555; }
    </style>
</head>
<body>
    <h1>🥗 Pay for Protein</h1>
    <p>Tap the mic and ask your nutrition doubt.</p>
    
    <button id="micBtn">🎤</button>
    <div id="status" class="status">Click to talk</div>

    <script>
        const micBtn = document.getElementById('micBtn');
        const status = document.getElementById('status');

        // 1. Setup Microphone (Speech to Text)
        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const speechApi = new Recognition();

        micBtn.onclick = () => {
            speechApi.start();
            status.innerText = "Listening...";
        };

        speechApi.onresult = async (event) => {
            const userQuery = event.results[0][0].transcript;
            status.innerText = "Thinking...";
            
            // 2. Send to Gemini Brain (Simplified Example)
            const response = await fetch('https://payforprotein.app.n8n.cloud/webhook-test/faef2cf2-a071-4576-8bc1-7f0ec0c05c6c', {
                method: 'POST',
                body: JSON.stringify({ message: userQuery })
            });
            const data = await response.json();
            
            speak(data.answer);
        };

        // 3. Setup Speaker (Text to Speech)
        function speak(text) {
            status.innerText = "Answering...";
            const utterance = new SpeechSynthesisUtterance(text);
            window.speechSynthesis.speak(utterance);
            status.innerText = "Done!";
        }
    </script>
</body>
</html>
